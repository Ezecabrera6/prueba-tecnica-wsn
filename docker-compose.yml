services:
  backend:
    build:
      context: ..
      dockerfile: challenge_solution/Dockerfile
    ports:
      - "8002:8000"
    command: ["uvicorn", "web_fastapi:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ..
      dockerfile: challenge_solution/frontend/Dockerfile
    ports:
      - "3011:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8002"
    depends_on:
      - backend
